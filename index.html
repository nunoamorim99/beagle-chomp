<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b0b16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Relative paths so they resolve under the GitHub Pages subpath (matches vite base: "./"). -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./favicon-180.png" />
    <title>Beagle Chomp</title>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <div class="hud">
      <div class="hud-left">
        <div class="stat"><div class="k">Score</div><div class="v" id="score">0</div></div>
        <!-- IDEA-016/IDEA-017 coin wallet display: a compact pill under Score
             so the Score/Map/Lives row keeps its original 3-way balance. -->
        <div class="coin-stat"><span class="coin-icon" aria-hidden="true">🪙</span><span class="k">Coins</span><span class="v" id="coins">0</span></div>
      </div>
      <div class="stat" style="text-align:center"><div class="k">Map</div><div class="v" id="level">1</div></div>
      <div class="stat" style="text-align:right"><div class="k">Lives</div><div class="lives v" id="lives">🐶🐶🐶</div></div>
      <button type="button" class="mute-btn" id="muteBtn" aria-label="Mute sound" aria-pressed="false">🔊</button>
      <!-- IDEA-012 shop: opens the skin-picker/storefront overlay (#shop below). -->
      <button type="button" class="shop-btn" id="shopBtn" aria-label="Open shop">🛒</button>
      <!-- IDEA-021: abandons the run in progress and returns to the main menu. -->
      <button type="button" class="home-btn" id="homeBtn" aria-label="Back to menu">🏠</button>
    </div>

    <div class="center hidden" id="center"></div>

    <!-- IDEA-021 v2: the full-screen main menu overlay. Transparent to the 3D
         menu scene rendered behind it (src/render/menuScene.ts) except its own
         text/buttons — the menu screen IS the 3D scene, with this UI floating
         over it. Shown/hidden by src/game/game.ts's showMenu(). -->
    <div class="hidden" id="mainMenu">
      <div class="menu-top">
        <div class="eyebrow">three.js &middot; maze chase</div>
        <h1>Beagle Chomp</h1>
        <p class="coin-line" id="menuCoinLine">&#x1FA99; 0 coins</p>
      </div>
      <div class="menu-bottom">
        <div class="menu-actions">
          <button type="button" id="playBtn">&#9654; Play</button>
          <button type="button" id="menuShopBtn" class="btn-secondary">&#128722; Shop</button>
        </div>
      </div>
    </div>

    <!-- IDEA-023 shop v2: a full-screen dedicated PAGE (not an overlay panel)
         — deliberately a SEPARATE container from #center/#mainMenu, so
         opening the shop mid-play or over the Start/main-menu screen never
         clobbers either (game.ts's tick() freezes gameplay underneath while
         this is open). Entirely (re)rendered by src/ui/shop.ts; the live 3D
         hero preview shows through from the canvas behind (src/render/
         shopScene.ts), same "transparent overlay over the 3D scene" pattern
         as #mainMenu. -->
    <div class="hidden" id="shop"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
