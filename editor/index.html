<!doctype html>
<!--
  Beagle Chomp — character editor (IDEA-025). DEV-ONLY page: `vite` serves it
  at /editor/ during development, but it is NOT a rollup input, so it never
  reaches dist/ or the PWA precache. See the note in vite.config.ts.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Beagle Chomp — Character Editor</title>
  </head>
  <body>
    <div id="editorApp">
      <div id="modeBar">
        <span class="mode-bar-label">Workbench</span>
        <button id="modeCharacterBtn" class="mode-btn active" data-mode="character">Character</button>
        <button id="modeBoardBtn" class="mode-btn" data-mode="board">Board &amp; Themes</button>
        <button id="modePropsBtn" class="mode-btn" data-mode="props">Props</button>
      </div>
      <aside id="treePane">
        <h2 class="pane-title" id="treePaneTitle">Parts</h2>
        <div id="partTree"></div>
        <!-- IDEA-033: Props mode's SECOND tree — the selected prop's own
             component list (base parts + any added primitives), stacked
             below the prop-library list above (#partTree doubles as that
             library list while in Props mode — see propsTree.ts). Hidden in
             every other mode (main.ts toggles `hidden` alongside the other
             mode-scoped panes) so Character/Board mode's single #partTree
             keeps the whole pane exactly as before. -->
        <h2 class="pane-title" id="propsPartTreeTitle" hidden>Components</h2>
        <div id="propsPartTree" hidden></div>
      </aside>
      <main id="viewportPane">
        <canvas id="viewport"></canvas>
        <div id="viewportHint">
          drag to orbit · scroll to zoom · click a part to select ·
          arrows nudge position (hold S = scale · hold R = rotate · Shift = big · Alt = fine ·
          Ctrl = depth/roll) · Ctrl+Z undo · Esc deselect
        </div>
      </main>
      <aside id="guiPane">
        <div id="charGuiHost"></div>
        <div id="boardGuiHost" hidden></div>
        <div id="propsGuiHost" hidden></div>
      </aside>
      <section id="codePane">
        <div id="codeTabs">
          <button class="code-tab active" data-tab="generated">Generated code</button>
          <button class="code-tab" data-tab="source">Real source</button>
          <span id="codeTitle"></span>
          <button id="saveFileBtn" class="save-btn" title="Write your edits straight into src/render/characters.ts (dev server only). The safe way — no copy-paste.">💾 Save to characters.ts</button>
          <button id="copyBtn" class="copy-btn" title="Fallback: copy just the edit lines, then paste them INSIDE makeBeagle, just before 'return g;'">Copy edits</button>
          <button id="copyFileBtn" class="copy-btn" title="Fallback: copy the COMPLETE characters.ts. Select ALL in the file (Ctrl+A) and paste to REPLACE it — never append.">Copy full file ⧉</button>
        </div>
        <div id="codeBody">
          <pre id="generatedView" class="code-view active"><code></code></pre>
          <pre id="sourceView" class="code-view"><code></code></pre>
        </div>
      </section>
    </div>
    <script type="module" src="../src/editor/main.ts"></script>
  </body>
</html>
